/* NAVBAR STYLES */
.custom-navbar {

}

.custom-navbar .navbar-brand {
  color: var(--heading);
  font-weight: 700;
  font-size: 1.5rem;
  letter-spacing: -0.5px;
}

.custom-navbar .nav-link {
  color: var(--text);
  font-weight: 600;
  font-size: 0.95rem;
  margin: 0 5px;
  position: relative;
  transition: color 0.3s ease;
}

.custom-navbar .nav-link:hover, 
.custom-navbar .nav-link.active {
  color: var(--heading);
}

.custom-navbar .nav-link::after {
  content: '';
  position: absolute;
  width: 0;
  height: 2px;
  bottom: 2px;
  left: 50%;
  background-color: var(--heading);
  transition: all 0.3s ease;
  transform: translateX(-50%);
  border-radius: 2px;
}

.custom-navbar .nav-link:hover::after,
.custom-navbar .nav-link.active::after {
  width: 70%;
}

/* FLOWERS */
.flower {

.f1 { top: 10px; left: 10px; }

/* CERTIFICATE CARDS (3 Per Row Setup) */
.certificate-card {

  border-radius: 20px;

  border: 1px solid rgba(255, 255, 255, 0.5);
  padding: 15px; 
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%; /* Ensures all cards in a row stretch to the same height */
}

.certificate-card:hover {
  transform: translateY(-8px) scale(1.02);
  box-shadow: 0 15px 35px rgba(82, 121, 111, 0.15);
}

.certificate-card img {
  width: 100%;
  height: 220px; /* Fixed height keeps the grid perfectly aligned */
  object-fit: contain; /* Ensures the whole certificate shows without cropping */
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.03); 
}
